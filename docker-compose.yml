name: taskboard-set2-local

services:
  auth-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB:       authdb
      POSTGRES_USER:     admin
      POSTGRES_PASSWORD: secret
    volumes:
      - auth-db-data:/var/lib/postgresql/data
      - ./auth-service/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d authdb"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [taskboard-net]

  task-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB:       taskdb
      POSTGRES_USER:     admin
      POSTGRES_PASSWORD: secret
    volumes:
      - task-db-data:/var/lib/postgresql/data
      - ./task-service/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d taskdb"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [taskboard-net]

  user-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB:       userdb
      POSTGRES_USER:     admin
      POSTGRES_PASSWORD: secret
    volumes:
      - user-db-data:/var/lib/postgresql/data
      - ./user-service/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d userdb"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [taskboard-net]

  auth-service:
    build: ./auth-service
    environment:
      DATABASE_URL: postgresql://admin:secret@auth-db:5432/authdb
      JWT_SECRET:   engce301-local-secret
      JWT_EXPIRES:  1h
      PORT:         3001
      NODE_ENV:     development
    depends_on:
      auth-db: { condition: service_healthy }
    networks: [taskboard-net]
    restart: unless-stopped

  task-service:
    build: ./task-service
    environment:
      DATABASE_URL: postgresql://admin:secret@task-db:5432/taskdb
      JWT_SECRET:   engce301-local-secret
      PORT:         3002
      NODE_ENV:     development
    depends_on:
      task-db:      { condition: service_healthy }
      auth-service: { condition: service_started }
    networks: [taskboard-net]
    restart: unless-stopped

  user-service:
    build: ./user-service
    environment:
      DATABASE_URL: postgresql://admin:secret@user-db:5432/userdb
      JWT_SECRET:   engce301-local-secret
      PORT:         3003
      NODE_ENV:     development
    depends_on:
      user-db:      { condition: service_healthy }
      auth-service: { condition: service_started }
    networks: [taskboard-net]
    restart: unless-stopped

  frontend:
    build: ./frontend
    networks: [taskboard-net]

  nginx:
    build: ./nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - auth-service
      - task-service
      - user-service
      - frontend
    networks: [taskboard-net]
    restart: unless-stopped

volumes:
  auth-db-data:
  task-db-data:
  user-db-data:

networks:
  taskboard-net:
    driver: bridge
